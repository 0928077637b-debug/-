<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>SYSTEM_CRITICAL_FAILURE</title>
<style>
    body {
        background-color: #000;
        color: #ff0000; /* أحمر دموي */
        font-family: 'Courier New', Courier, monospace;
        margin: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-transform: uppercase;
    }
    .glitch {
        font-size: 1.5em;
        text-align: center;
        animation: shake 0.1s infinite;
        text-shadow: 2px 2px #555;
    }
    #loading-bar {
        width: 80%;
        height: 20px;
        border: 2px solid #ff0000;
        margin-top: 20px;
        position: relative;
    }
    #progress {
        width: 0%;
        height: 100%;
        background-color: #ff0000;
    }
    @keyframes shake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        20% { transform: translate(-1px, -2px) rotate(-1deg); }
        40% { transform: translate(-3px, 0px) rotate(1deg); }
        60% { transform: translate(3px, 2px) rotate(0deg); }
        80% { transform: translate(-1px, -1px) rotate(1deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
</style>
</head>
<body onclick="startHorror()">

    <div id="content" class="glitch">
        إضغط لبدء فحص النظام...
    </div>

    <script>
        function startHorror() {
            // تفعيل ملء الشاشة لإخفاء كل شيء
            var el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();

            const content = document.getElementById('content');
            content.innerHTML = "جاري اختراق الـ Kernel...<br>تم اكتشاف محاولة تلاعب!<br><br>جاري تهيئة الذاكرة (Formatting)...";
            
            let bar = document.createElement('div');
            bar.id = 'loading-bar';
            bar.innerHTML = '<div id="progress"></div>';
            document.body.appendChild(bar);

            let progress = document.getElementById('progress');
            let width = 0;
            
            let interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    document.body.innerHTML = "<h1 style='font-size:3em; color:white;'>تم حذف جميع ملفاتك!<br>REBOOT REQUIRED</h1>";
                    // محاولة اهتزاز الهاتف (تعمل في بعض متصفحات الأندرويد)
                    if (navigator.vibrate) navigator.vibrate([500, 300, 500]);
                } else {
                    width++;
                    progress.style.width = width + '%';
                    if (width == 50) content.innerHTML = "خطأ في قطاعات الذاكرة!<br>جاري المسح النهائي...";
                }
            }, 100); // سرعة المسح
        }
    </script>
</body>
</html>
