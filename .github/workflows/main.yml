name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build APK from PWA
        uses: sharadcodes/pwa-to-apk-action@v1.0.0
        with:
          # النقطة تعني أن ملفات الـ HTML في المجلد الرئيسي
          project-root-folder: '.'
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-game-apk
          path: ./*.apk
          
